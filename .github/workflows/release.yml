name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: cd web && npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/out/

  build-unix-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: build-frontend
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/out/

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags "-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
            -o grokforge-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/grokforge

      - uses: actions/upload-artifact@v4
        with:
          name: grokforge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: grokforge-*

  build-windows-binary:
    name: Build windows/amd64
    runs-on: windows-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/out/

      - name: Build binary
        shell: pwsh
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: |
          $version = "${{ github.ref_name }}"
          $buildTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          go build -ldflags "-X main.version=$version -X main.buildTime=$buildTime" -o grokforge-windows-amd64.exe ./cmd/grokforge

      - name: Smoke test binary
        shell: pwsh
        run: |
          $port = 18080
          @'
          [app]
          host = "127.0.0.1"
          port = 18080
          db_driver = "sqlite"
          db_path = "data/smoke-release.db"
          log_level = "error"
          '@ | Set-Content -Path smoke-config.toml

          $stdout = "smoke-release.stdout.log"
          $stderr = "smoke-release.stderr.log"
          $proc = Start-Process -FilePath .\grokforge-windows-amd64.exe -ArgumentList "-config", "smoke-config.toml" -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
          try {
            $healthy = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              if ($proc.HasExited) {
                break
              }
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:$port/healthz"
                if ($resp.StatusCode -eq 200) {
                  $healthy = $true
                  break
                }
              } catch {
              }
            }

            if (-not $healthy) {
              if (Test-Path $stdout) {
                Write-Host "=== smoke stdout ==="
                Get-Content $stdout
              }
              if (Test-Path $stderr) {
                Write-Host "=== smoke stderr ==="
                Get-Content $stderr
              }
              throw "windows smoke test failed: /healthz did not become ready"
            }
          } finally {
            if ($null -ne $proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: grokforge-windows-amd64
          path: grokforge-windows-amd64.exe

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build-unix-binaries
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: grokforge-linux-amd64
          path: dist/linux-amd64

      - uses: actions/download-artifact@v4
        with:
          name: grokforge-linux-arm64
          path: dist/linux-arm64

      - name: Prepare binaries
        run: |
          chmod +x dist/linux-amd64/grokforge-linux-amd64
          chmod +x dist/linux-arm64/grokforge-linux-arm64

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-unix-binaries
      - build-windows-binary
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Extract the section for this version from CHANGELOG.md
          # Format: ## vX.Y.Z\n\n...content...\n\n---
          python3 -c "
          import re, sys
          with open('CHANGELOG.md') as f:
              content = f.read()
          # Match the version section (## vX.Y.Z ... until next ## or ---)
          pattern = r'^## ' + re.escape('$VERSION') + r'\s*\n\n(.*?)(?=\n---|\n## |\Z)'
          m = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          if m:
              body = m.group(1).strip()
          else:
              body = 'Release $VERSION'
          # Write to GITHUB_OUTPUT (multiline)
          with open(sys.argv[1], 'a') as f:
              f.write('body<<EOF\n')
              f.write(body + '\n')
              f.write('EOF\n')
          " "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/grokforge-*
