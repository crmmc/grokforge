default_mode = "default"

  [[family.mode]]
  mode           = "default"
  upstream_model = "grok-3"
  upstream_mode  = "MODEL_MODE_FAST"

  [[family.mode]]
  mode                = "lite"
  upstream_model      = "grok-3"
  upstream_mode       = "MODEL_MODE_FAST"
  pool_floor_override = "basic"

[[family]]
model        = "grok-imagine-image-edit"
