# config/models.seed.toml

[[family]]
model          = "grok-4.20"
display_name   = "Grok 4.20"
type           = "chat"
pool_floor     = "basic"
upstream_model = "grok-420"

  [[family.mode]]
  mode           = "default"
  upstream_mode  = "auto"

  [[family.mode]]
  mode           = "fast"
  upstream_mode  = "fast"

  [[family.mode]]
  mode            = "think"
  upstream_mode   = "auto"
  force_thinking  = true

  [[family.mode]]
  mode                = "expert"
  upstream_mode       = "expert"
  pool_floor_override = "super"

  [[family.mode]]
  mode                = "heavy"
  upstream_mode       = "heavy"
  pool_floor_override = "heavy"

[[family]]
model        = "grok-imagine-image"
display_name = "Grok Imagine Image"
type         = "image_ws"
pool_floor   = "super"

  [[family.mode]]
  mode = "default"

  [[family.mode]]
  mode       = "pro"
  enable_pro = true

[[family]]
model        = "grok-imagine-image-lite"
display_name = "Grok Imagine Image Lite"
type         = "image"
pool_floor   = "basic"

  [[family.mode]]
  mode          = "default"
  upstream_mode = "fast"

[[family]]
model          = "grok-imagine-image-edit"
display_name   = "Grok Imagine Image Edit"
type           = "image_edit"
pool_floor     = "super"
upstream_model = "imagine-image-edit"

  [[family.mode]]
  mode           = "default"
  upstream_mode  = "auto"

[[family]]
model          = "grok-imagine-video"
display_name   = "Grok Imagine Video"
type           = "video"
pool_floor     = "super"
upstream_model = "grok-3"

  [[family.mode]]
  mode           = "default"
  upstream_mode  = "auto"
